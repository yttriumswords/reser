<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Student Health Diagnostic System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#2563eb;
--low:#16a34a;
--moderate:#f59e0b;
--high:#dc2626;
--bg:#f4f7fb;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
display:flex;
justify-content:center;
padding:30px;
}

.container{
width:100%;
max-width:850px;
}

.card{
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
color:var(--primary);
}

label{
display:block;
margin-top:15px;
font-weight:500;
}

textarea,input,select{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #d1d5db;
margin-top:5px;
}

button{
width:100%;
margin-top:20px;
padding:14px;
border:none;
border-radius:14px;
background:var(--primary);
color:white;
font-weight:600;
cursor:pointer;
}

.dashboard{
margin-top:25px;
display:none;
}

.risk-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.risk-badge{
padding:8px 16px;
border-radius:30px;
color:white;
font-weight:600;
}

.low{background:var(--low);}
.moderate{background:var(--moderate);}
.high{background:var(--high);}

.section{
background:#f9fafb;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.section h3{
margin:0 0 8px 0;
font-size:14px;
color:#6b7280;
text-transform:uppercase;
}

.emergency{
background:#fee2e2;
color:var(--high);
padding:15px;
border-radius:12px;
font-weight:600;
margin-top:15px;
}

.disclaimer{
font-size:12px;
margin-top:20px;
color:#6b7280;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>AI Student Health Diagnostic System</h1>

<form id="healthForm">
<label>Describe Symptoms</label>
<textarea id="symptoms" rows="3" required></textarea>

<label>Temperature (°C)</label>
<input type="number" id="temperature" min="30" max="45" step="0.1" required>

<label>Severity</label>
<select id="severity" required>
<option value="">Select</option>
<option value="mild">Mild</option>
<option value="moderate">Moderate</option>
<option value="severe">Severe</option>
</select>

<label>Duration (Days)</label>
<input type="number" id="days" min="0" max="30" required>

<button type="submit">Run Diagnosis</button>
</form>

<div id="dashboard" class="dashboard">
<div class="risk-header">
<h2>Health Report</h2>
<div id="riskBadge" class="risk-badge"></div>
</div>

<div id="analysisContent"></div>
</div>

<div class="disclaimer">
This system is for educational purposes only and does not replace professional medical advice.
</div>

</div>
</div>

<script>
const form=document.getElementById("healthForm");
const dashboard=document.getElementById("dashboard");
const riskBadge=document.getElementById("riskBadge");
const analysisContent=document.getElementById("analysisContent");

function analyze(symptoms,temp,severity,days){

let score=0;
let detected=[];
let conditions=[];
let emergency=false;
let recommendations=[];
let medications=[];

const keywords=["cough","headache","nausea","vomiting","diarrhea","fatigue","chest pain","shortness of breath","fever","sore throat","dizziness"];

keywords.forEach(k=>{
if(symptoms.includes(k)){
detected.push(k);
score++;
}
});

if(temp>=39) score+=3;
else if(temp>=38) score+=2;
else if(temp>=37.5) score+=1;

if(severity==="moderate") score+=2;
if(severity==="severe") score+=3;

if(days>7) score+=3;
else if(days>4) score+=2;

if(symptoms.includes("chest pain") || symptoms.includes("shortness of breath") || temp>=40){
score+=5;
emergency=true;
}

let risk="low";
if(score>=10) risk="high";
else if(score>=5) risk="moderate";

if(risk==="low"){
recommendations=[
"Get plenty of rest (7–9 hours).",
"Drink fluids regularly.",
"Monitor symptoms for 24–48 hours.",
"Avoid strenuous activity."
];
medications=[
"Paracetamol (for mild fever or headache).",
"Ibuprofen (for body aches, if no allergies).",
"Cough lozenges (for sore throat)."
];
}

if(risk==="moderate"){
recommendations=[
"Schedule a medical consultation within 1–2 days.",
"Monitor temperature twice daily.",
"Increase hydration and nutrition intake.",
"Avoid school/work if symptoms worsen."
];
medications=[
"Paracetamol or Ibuprofen (for fever and pain).",
"Oral rehydration solution (if vomiting/diarrhea).",
"Over-the-counter cold/flu medication."
];
}

if(risk==="high"){
recommendations=[
"Immediate medical attention required.",
"Do not delay seeking emergency care.",
"Avoid self-medication without professional guidance."
];
}

if(detected.includes("cough") && temp>=38)
conditions.push("Respiratory Infection");

if(detected.includes("vomiting") || detected.includes("diarrhea"))
conditions.push("Gastrointestinal Infection");

if(detected.includes("headache") && temp>=38)
conditions.push("Viral Fever");

if(conditions.length===0)
conditions.push("Mild Viral Illness");

return{risk,detected,conditions,recommendations,medications,emergency};
}

function render(data){

dashboard.style.display="block";
analysisContent.innerHTML="";

riskBadge.textContent=data.risk.toUpperCase()+" RISK";
riskBadge.className="risk-badge "+data.risk;

analysisContent.innerHTML+=`
<div class="section">
<h3>Detected Symptoms</h3>
<p>${data.detected.length?data.detected.join(", "):"No major keywords detected."}</p>
</div>

<div class="section">
<h3>Possible Conditions</h3>
<p>${data.conditions.join(", ")}</p>
</div>

<div class="section">
<h3>Recommended Actions</h3>
<ul>${data.recommendations.map(r=>"<li>"+r+"</li>").join("")}</ul>
</div>
`;

if(data.medications.length>0){
analysisContent.innerHTML+=`
<div class="section">
<h3>Suggested Medications (General OTC)</h3>
<ul>${data.medications.map(m=>"<li>"+m+"</li>").join("")}</ul>
<p style="font-size:12px;color:#6b7280;">Always consult a healthcare provider before taking medication.</p>
</div>
`;
}

if(data.risk==="high"){
analysisContent.innerHTML+=`
<div class="emergency">
⚠ High-risk condition detected. Redirecting to nearest hospital...
</div>
`;
}

if(data.emergency){
setTimeout(()=>{
window.location.href="https://www.google.com/maps/search/nearest+hospital";
},4000);
}
}

form.addEventListener("submit",function(e){
e.preventDefault();
const symptoms=document.getElementById("symptoms").value.toLowerCase();
const temp=parseFloat(document.getElementById("temperature").value);
const severity=document.getElementById("severity").value;
const days=parseInt(document.getElementById("days").value);

const result=analyze(symptoms,temp,severity,days);
render(result);
});
</script>

</body>
</html>
