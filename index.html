<div id="dashboard" class="dashboard">
<div class="risk-header">
<h2>Health Report</h2>
<div id="riskBadge" class="risk-badge"></div>
</div>

<div id="analysisContent"></div>
</div>

<div class="disclaimer">
This system is for educational purposes only and does not replace professional medical advice.
</div>

</div>
</div>

<script>
const form=document.getElementById("healthForm");
const dashboard=document.getElementById("dashboard");
const riskBadge=document.getElementById("riskBadge");
const analysisContent=document.getElementById("analysisContent");

function analyze(symptoms,temp,severity,days){

let score=0;
let detected=[];
let conditions=[];
let emergency=false;
let recommendations=[];
let medications=[];

const keywords=["cough","headache","nausea","vomiting","diarrhea","fatigue","chest pain","shortness of breath","fever","sore throat","dizziness"];

keywords.forEach(k=>{
if(symptoms.includes(k)){
detected.push(k);
score++;
}
});

if(temp>=39) score+=3;
else if(temp>=38) score+=2;
else if(temp>=37.5) score+=1;

if(severity==="moderate") score+=2;
if(severity==="severe") score+=3;

if(days>7) score+=3;
else if(days>4) score+=2;

if(symptoms.includes("chest pain") || symptoms.includes("shortness of breath") || temp>=40){
score+=5;
emergency=true;
}

let risk="low";
if(score>=10) risk="high";
else if(score>=5) risk="moderate";

if(risk==="low"){
recommendations=[
"Get plenty of rest (7–9 hours).",
"Drink fluids regularly.",
"Monitor symptoms for 24–48 hours.",
"Avoid strenuous activity."
];
medications=[
"Paracetamol (for mild fever or headache).",
"Ibuprofen (for body aches, if no allergies).",
"Cough lozenges (for sore throat)."
];
}

if(risk==="moderate"){
recommendations=[
"Schedule a medical consultation within 1–2 days.",
"Monitor temperature twice daily.",
"Increase hydration and nutrition intake.",
"Avoid school/work if symptoms worsen."
];
medications=[
"Paracetamol or Ibuprofen (for fever and pain).",
"Oral rehydration solution (if vomiting/diarrhea).",
"Over-the-counter cold/flu medication."
];
}

if(risk==="high"){
recommendations=[
"Immediate medical attention required.",
"Do not delay seeking emergency care.",
"Avoid self-medication without professional guidance."
];
}

if(detected.includes("cough") && temp>=38)
conditions.push("Respiratory Infection");

if(detected.includes("vomiting") || detected.includes("diarrhea"))
conditions.push("Gastrointestinal Infection");

if(detected.includes("headache") && temp>=38)
conditions.push("Viral Fever");

if(conditions.length===0)
conditions.push("Mild Viral Illness");

return{risk,detected,conditions,recommendations,medications,emergency};
}

function render(data){

dashboard.style.display="block";
analysisContent.innerHTML="";

riskBadge.textContent=data.risk.toUpperCase()+" RISK";
riskBadge.className="risk-badge "+data.risk;

analysisContent.innerHTML+=`
<div class="section">
<h3>Detected Symptoms</h3>
<p>${data.detected.length?data.detected.join(", "):"No major keywords detected."}</p>
</div>

<div class="section">
<h3>Possible Conditions</h3>
<p>${data.conditions.join(", ")}</p>
</div>

<div class="section">
<h3>Recommended Actions</h3>
<ul>${data.recommendations.map(r=>"<li>"+r+"</li>").join("")}</ul>
</div>
`;

if(data.medications.length>0){
analysisContent.innerHTML+=`
<div class="section">
<h3>Suggested Medications (General OTC)</h3>
<ul>${data.medications.map(m=>"<li>"+m+"</li>").join("")}</ul>
<p style="font-size:12px;color:#6b7280;">Always consult a healthcare provider before taking medication.</p>
</div>
`;
}

if(data.risk==="high"){
analysisContent.innerHTML+=`
<div class="emergency">
⚠ High-risk condition detected. Redirecting to nearest hospital...
</div>
`;
}

if(data.emergency){
setTimeout(()=>{
window.location.href="https://www.google.com/maps/search/nearest+hospital";
},4000);
}
}

form.addEventListener("submit",function(e){
e.preventDefault();
const symptoms=document.getElementById("symptoms").value.toLowerCase();
const temp=parseFloat(document.getElementById("temperature").value);
const severity=document.getElementById("severity").value;
const days=parseInt(document.getElementById("days").value);

const result=analyze(symptoms,temp,severity,days);
render(result);
});
</script>

</body>
</html>
